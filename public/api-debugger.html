<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Debugger</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    margin:20px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
}

textarea{
    height:120px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    cursor:pointer;
}

pre{
    background:#efefef;
    padding:10px;
    border-radius:5px;
    overflow:auto;
}

#status{
    font-size:20px;
    font-weight:bold;
    margin-top:20px;
}
</style>

</head>

<body>

<h1>API Debugger</h1>

<label>Método</label>

<select id="method">
    <option>GET</option>
    <option>POST</option>
    <option>PUT</option>
    <option>DELETE</option>
    <option>PATCH</option>
</select>

<label>Rota</label>

<input
id="url"
value="/todo">

<label>Cabeçalhos (JSON)</label>

<textarea id="headers">{
"Content-Type":"application/json"
}</textarea>

<label>Body (JSON)</label>

<textarea id="body">{

}</textarea>

<button id="send">
Enviar Requisição
</button>

<h2>Status</h2>

<div id="status">...</div>

<h2>Resposta</h2>

<pre id="response"></pre>

<script>

const bt=document.querySelector("#send");

const method=document.querySelector("#method");
const url=document.querySelector("#url");
const headers=document.querySelector("#headers");
const body=document.querySelector("#body");

const status=document.querySelector("#status");
const response=document.querySelector("#response");

bt.addEventListener("click",async()=>{

    status.textContent="";
    response.textContent="";

    let requestHeaders;
    let requestBody;

    try{

        requestHeaders=headers.value.trim()===""
            ?{}
            :JSON.parse(headers.value);

    }catch{

        alert("Cabeçalhos inválidos.");
        return;

    }

    try{

        if(body.value.trim()!=""){

            requestBody=JSON.stringify(
                JSON.parse(body.value)
            );

        }

    }catch{

        alert("JSON do Body inválido.");
        return;

    }

    try{

        const req=await fetch(url.value,{

            method:method.value,

            headers:requestHeaders,

            body:
                method.value==="GET"||
                method.value==="DELETE"
                ?undefined
                :requestBody

        });

        status.textContent=req.status+" "+req.statusText;

        const text=await req.text();

        try{

            response.textContent=
            JSON.stringify(JSON.parse(text),null,2);

        }catch{

            response.textContent=text;

        }

    }catch(e){

        status.textContent="Erro";

        response.textContent=e;

    }

});

</script>

</body>

</html>
